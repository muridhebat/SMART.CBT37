<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMART ~ CBT</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9805/9805578.png" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      width: 100%; 
      height: 100%; 
      background: #f0f4ff; 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      overflow: hidden; 
    }
    
    .container { 
      width: 100%; 
      height: 100vh; 
      height: -webkit-fill-available; 
      display: flex; 
      flex-direction: column; 
    }
    
    .iframe-container { 
      flex: 1; 
      width: 100%; 
      height: 100%; 
      position: relative; 
      overflow: hidden; 
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #f1f5f9; 
    }

    /* ========================================
       LOADING SCREEN
       ======================================== */
    .loading { 
      position: fixed; 
      top: 0; left: 0;
      width: 100%; 
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 40%, #f0f4ff 100%);
      z-index: 10; 
      transition: opacity 0.6s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* --- KUBUS 3D --- */
    .cube-wrap {
      perspective: 200px;
      margin-bottom: 32px;
    }

    .cube {
      width: 50px;
      height: 50px;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 1.8s infinite linear;
    }

    .face {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
      box-shadow: inset 0 0 15px rgba(255,255,255,0.3);
      backface-visibility: hidden;
    }

    .f-front  { background: linear-gradient(135deg, #ef4444, #dc2626); transform: rotateY(0deg) translateZ(25px); }
    .f-back   { background: linear-gradient(135deg, #f97316, #ea580c); transform: rotateY(180deg) translateZ(25px); }
    .f-right  { background: linear-gradient(135deg, #22c55e, #16a34a); transform: rotateY(90deg) translateZ(25px); }
    .f-left   { background: linear-gradient(135deg, #3b82f6, #2563eb); transform: rotateY(-90deg) translateZ(25px); }
    .f-top    { background: linear-gradient(135deg, #ffffff, #f1f5f9); transform: rotateX(90deg) translateZ(25px); color: rgba(59,130,246,0.6); }
    .f-bottom { background: linear-gradient(135deg, #eab308, #ca8a04); transform: rotateX(-90deg) translateZ(25px); }

    @keyframes spin {
      0%   { transform: rotateX(0deg) rotateY(0deg); }
      25%  { transform: rotateX(90deg) rotateY(90deg); }
      50%  { transform: rotateX(180deg) rotateY(180deg); }
      75%  { transform: rotateX(270deg) rotateY(270deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }

    /* --- TEKS --- */
    .loading-text {
      font-size: 0.95rem;
      font-weight: 700;
      color: #475569;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .loading-text::after {
      content: '';
      animation: dots 2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    /* --- SUB TEKS --- */
    .loading-sub {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 6px;
      font-weight: 500;
    }

    /* ========================================
       RESPONSIF HP
       ======================================== */
    @media (max-width: 640px) {
      .cube-wrap {
        perspective: 280px;
        margin-bottom: 40px;
      }

      .cube {
        width: 70px;
        height: 70px;
      }

      .face {
        width: 70px;
        height: 70px;
        font-size: 30px;
        border-radius: 14px;
        border-width: 3px;
      }

      .f-front  { transform: rotateY(0deg) translateZ(35px); }
      .f-back   { transform: rotateY(180deg) translateZ(35px); }
      .f-right  { transform: rotateY(90deg) translateZ(35px); }
      .f-left   { transform: rotateY(-90deg) translateZ(35px); }
      .f-top    { transform: rotateX(90deg) translateZ(35px); }
      .f-bottom { transform: rotateX(-90deg) translateZ(35px); }

      .loading-text {
        font-size: 1.15rem;
        letter-spacing: 1.5px;
      }

      .loading-sub {
        font-size: 0.85rem;
        margin-top: 8px;
      }
    }

    @media (min-width: 641px) {
      .cube {
        width: 50px;
        height: 50px;
      }

      .face {
        width: 50px;
        height: 50px;
        font-size: 22px;
        border-radius: 10px;
      }

      .f-front  { transform: rotateY(0deg) translateZ(25px); }
      .f-back   { transform: rotateY(180deg) translateZ(25px); }
      .f-right  { transform: rotateY(90deg) translateZ(25px); }
      .f-left   { transform: rotateY(-90deg) translateZ(25px); }
      .f-top    { transform: rotateX(90deg) translateZ(25px); }
      .f-bottom { transform: rotateX(-90deg) translateZ(25px); }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Loading Screen -->
    <div class="loading" id="loading">
      <div class="cube-wrap">
        <div class="cube">
          <div class="face f-front">∑</div>
          <div class="face f-back">π</div>
          <div class="face f-right">∫</div>
          <div class="face f-left">∞</div>
          <div class="face f-top">÷</div>
          <div class="face f-bottom">√</div>
        </div>
      </div>
      <p class="loading-text">Memuat Aplikasi</p>
      <p class="loading-sub">Harap tunggu sebentar...</p>
    </div>

    <div class="iframe-container">
      <!-- 
        allow-popups-to-escape-sandbox : agar tab baru dari iframe BEBAS dari sandbox 
        sehingga bisa mengakses Google Drive untuk download 
      -->
      <iframe id="appFrame" src="" 
        allow="fullscreen; camera; microphone" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals allow-downloads">
      </iframe>
    </div>
  </div>

  <script>
    // =============================================
    // URL Google Apps Script Anda
    // =============================================
    var APP_URL = "https://script.google.com/macros/s/AKfycbywJyekSJ9AVcLXHCNQp729vxZXfi_ptas2DjhmGAy2glgF1lmpj1qfHOXoOnrDP18Lhw/exec";
    
    var appFrame = document.getElementById('appFrame');
    var loading = document.getElementById('loading');
    var downloadTabRef = null;

    // =============================================
    // HANDLER REQUEST DARI IFRAME
    // =============================================
    window.addEventListener('message', function(event) {
      try {
        var data = event.data;
        if (!data || typeof data !== 'object') return;

        // 1. Buka tab loading dengan halaman HTML yang proper (menggunakan Blob URL)
        if (data.action === 'openBlank') {
          var html = 
            '<!DOCTYPE html><html><head><meta charset="utf-8">' +
            '<meta name="viewport" content="width=device-width,initial-scale=1">' +
            '<title>Download...</title>' +
            '<style>' +
            '*{margin:0;padding:0;box-sizing:border-box}' +
            'body{display:flex;align-items:center;justify-content:center;min-height:100vh;' +
            'font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#475569}' +
            '.wrap{text-align:center;padding:24px}' +
            '.spinner{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#3b82f6;' +
            'border-radius:50%;animation:s 0.8s linear infinite;margin:0 auto 20px}' +
            'p.title{font-size:16px;font-weight:600;margin:0}' +
            'p.sub{font-size:13px;color:#94a3b8;margin-top:6px}' +
            '@keyframes s{to{transform:rotate(360deg)}}' +
            '@media(max-width:640px){.spinner{width:56px;height:56px}p.title{font-size:18px}}' +
            '</style></head><body>' +
            '<div class="wrap">' +
            '<div class="spinner"></div>' +
            '<p class="title">Menyiapkan file download...</p>' +
            '<p class="sub">File akan otomatis terunduh</p>' +
            '</div></body></html>';
          
          var blob = new Blob([html], { type: 'text/html' });
          var blobUrl = URL.createObjectURL(blob);
          downloadTabRef = window.open(blobUrl, '_blank');
          
          // Bersihkan blob URL setelah beberapa detik
          setTimeout(function() { 
            try { URL.revokeObjectURL(blobUrl); } catch(e) {} 
          }, 10000);
          
          return;
        }

        // 2. Download siap: tutup tab loading, buka URL download langsung
        if (data.action === 'downloadReady' && data.url) {
          if (downloadTabRef) {
            try { downloadTabRef.close(); } catch(e) {}
            downloadTabRef = null;
          }
          window.open(data.url, '_blank');
          return;
        }

        // 3. Fallback: buka URL langsung dari parent
        if (data.action === 'openDownload' && data.url) {
          window.open(data.url, '_blank');
          return;
        }

        // 4. Fullscreen dari parent document
        if (data.action === 'requestFullscreen') {
          var el = document.documentElement;
          var fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
          if (fn) fn.call(el).catch(function(){});
          return;
        }
      } catch(e) {
        // Silent fail untuk tidak mengganggu user
      }
    });

    // =============================================
    // LOGIKA LOAD IFRAME
    // =============================================
    var startTime = Date.now();
    var MIN_LOAD_TIME = 6000;
    
    function loadApp() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      
      var targetUrl = APP_URL;
      
      if (id) {
        targetUrl += (targetUrl.indexOf('?') !== -1 ? '&' : '?') + "id=" + id;
      }
      
      appFrame.src = targetUrl;
    }
    
    function hideLoading() {
      loading.classList.add('hidden');
    }

    appFrame.addEventListener('load', function() {
      var elapsed = Date.now() - startTime;
      var remaining = MIN_LOAD_TIME - elapsed;

      if (remaining > 0) {
        setTimeout(hideLoading, remaining);
      } else {
        hideLoading();
      }
    });
    
    window.addEventListener('DOMContentLoaded', loadApp);
  </script>
</body>
</html>
